apiVersion: v1
data:
  config.yaml: |
    spec:
      resources:
      - groupVersionKind:
          group: notification.toolkit.fluxcd.io
          kind: Alert
          version: '*'
        metricNamePrefix: gotk
        metrics:
        - each:
            info:
              labelsFromPath:
                name:
                - metadata
                - name
            type: Info
          help: The current state of a Flux Alert resource.
          labelsFromPath:
            exported_namespace:
            - metadata
            - namespace
            suspended:
            - spec
            - suspend
          name: resource_info
      - groupVersionKind:
          group: source.toolkit.fluxcd.io
          kind: Bucket
          version: '*'
        metricNamePrefix: gotk
        metrics:
        - each:
            info:
              labelsFromPath:
                name:
                - metadata
                - name
            type: Info
          help: The current state of a Flux Bucket resource.
          labelsFromPath:
            bucket_name:
            - spec
            - bucketName
            endpoint:
            - spec
            - endpoint
            exported_namespace:
            - metadata
            - namespace
            ready:
            - status
            - conditions
            - '[type=Ready]'
            - status
            revision:
            - status
            - artifact
            - revision
            suspended:
            - spec
            - suspend
          name: resource_info
